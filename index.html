<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athlete Pro | Premium Dashboard</title>
    
    <!-- Fontlar ve İkonlar -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* Genel Ayarlar ve Değişkenler */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #10b981; /* Neon Yeşil */
            --primary-hover: #059669;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --accent: #3b82f6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.8s ease-out;
        }

        /* Animasyonlar */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        /* Başlık */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .header h1 {
            font-size: 1.8em;
            margin: 0;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Kart Tasarımı */
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-3px); }

        .card-title {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Kalori ve İstatistikler */
        .cal-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .cal-number {
            font-size: 3.5em;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }
        .cal-number span { font-size: 0.3em; color: var(--text-muted); font-weight: 400; }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 16px;
        }

        .stat-item { text-align: center; font-size: 0.85em; color: var(--text-muted); }
        .stat-value { font-size: 1.3em; font-weight: 700; color: #fff; display: block; margin-top: 5px; }

        /* Takvim */
        .day-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 15px;
            margin-bottom: 10px;
            scrollbar-width: none;
        }
        .day-scroll::-webkit-scrollbar { display: none; }
        
        .day-btn {
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            border-radius: 18px;
            cursor: pointer;
            min-width: 50px;
            text-align: center;
            font-weight: 600;
            transition: 0.3s;
            color: var(--text-muted);
        }
        .day-btn:hover { background: rgba(255,255,255,0.1); }
        .day-btn.active {
            border-color: var(--primary);
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
        }

        /* Checkbox Listeleri (Supplement, Postür, Karın) */
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            margin-bottom: 10px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .task-item:hover { background: rgba(255,255,255,0.05); }
        
        .custom-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .custom-checkbox i { color: transparent; font-size: 14px; transition: 0.3s; }
        
        .task-item.completed .custom-checkbox {
            background: var(--primary);
            border-color: var(--primary);
            animation: pulse 1s;
        }
        .task-item.completed .custom-checkbox i { color: #fff; }
        .task-item.completed .task-text { text-decoration: line-through; color: var(--text-muted); }

        /* Form ve Butonlar */
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 18px; color: var(--text-muted); }
        input {
            width: 100%;
            padding: 16px 16px 16px 45px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            font-size: 1em;
            color: #fff;
            box-sizing: border-box;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        input:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.4); }
        
        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: 'Poppins', sans-serif;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }

        /* Grafik Konteyner */
        .chart-container { position: relative; height: 250px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fa-solid fa-bolt"></i> Athlete Pro</h1>
        <span id="date-title" style="color: var(--text-muted); font-weight: 600;">Bugün</span>
    </div>

    <!-- Takvim -->
    <div class="day-scroll" id="calendar"></div>

    <!-- İstatistik Kartı -->
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-fire"></i> Günlük Kalori & Makro Tablosu</div>
        <div class="cal-container">
            <div class="cal-number" id="show-cal">0 <span>kcal</span></div>
            <i class="fa-solid fa-chart-pie" style="font-size: 3em; color: rgba(255,255,255,0.05);"></i>
        </div>
        <div class="grid-stats">
            <div class="stat-item">Protein <span class="stat-value" id="show-prot" style="color: #ef4444;">0g</span></div>
            <div class="stat-item">Karb <span class="stat-value" id="show-carb" style="color: #3b82f6;">0g</span></div>
            <div class="stat-item">Yağ <span class="stat-value" id="show-fat" style="color: #eab308;">0g</span></div>
            <div class="stat-item">Adım <span class="stat-value" id="show-steps" style="color: #8b5cf6;">0</span></div>
        </div>
    </div>

    <!-- Supplement Takip -->
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-capsules" style="color: #f472b6;"></i> Supplement Rutini</div>
        <ul class="task-list" id="list-supplements"></ul>
    </div>

    <!-- Postür Hareketleri -->
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-person" style="color: #2dd4bf;"></i> Günlük Postür Düzeltme</div>
        <ul class="task-list" id="list-posture"></ul>
    </div>

    <!-- Karın Kası & Ev Antrenmanı -->
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-dumbbell" style="color: #fb923c;"></i> Core & Karın Kası (Ev)</div>
        <ul class="task-list" id="list-abs"></ul>
    </div>

    <!-- Veri Girişi Formu -->
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-pen-to-square"></i> Değerleri Gir</div>
        
        <div class="input-group">
            <i class="fa-solid fa-fire"></i>
            <input type="number" id="cal" placeholder="Kalori (kcal)">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-drumstick-bite"></i>
            <input type="number" id="prot" placeholder="Protein (g)">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-wheat-awn"></i>
            <input type="number" id="carb" placeholder="Karbonhidrat (g)">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-tint"></i>
            <input type="number" id="fat" placeholder="Yağ (g)">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-shoe-prints"></i>
            <input type="number" id="steps" placeholder="Adım Sayısı">
        </div>
        
        <button onclick="saveData()"><i class="fa-solid fa-check"></i> Verileri Kaydet</button>
    </div>

    <!-- Kalori Grafiği -->
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-chart-line"></i> Haftalık Kalori Geçmişi</div>
        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>
</div>

<script>
    // Veritabanı ve Görev Tanımları
    let db = JSON.parse(localStorage.getItem('athleteDB')) || {};
    let selectedDate = new Date().toISOString().slice(0,10);
    let chart;

    // Görev listeleri (Supplement, Postür, Karın Kası)
    const tasksConfig = {
        supplements: [
            { id: 'sup_whey', label: 'Whey Protein (Antrenman Sonrası)' },
            { id: 'sup_crea', label: 'Kreatin (5g)' },
            { id: 'sup_omega', label: 'Omega-3 & Multivitamin' },
            { id: 'sup_pre', label: 'Pre-Workout / Kahve' }
        ],
        posture: [
            { id: 'pos_wall', label: 'Wall Angels (3 Set x 15 Tekrar)' },
            { id: 'pos_cat', label: 'Cat-Cow Esnemesi (1 Dakika)' },
            { id: 'pos_chin', label: 'Chin Tucks / Boyun Geriye (3x12)' }
        ],
        abs: [
            { id: 'abs_plank', label: 'Plank Bekleyişi (3 x 1 Dakika)' },
            { id: 'abs_twist', label: 'Russian Twist (3 Set x 20 Tekrar)' },
            { id: 'abs_raise', label: 'Lying Leg Raise (3 Set x 15 Tekrar)' }
        ]
    };

    // Seçili gün için varsayılan verileri oluştur
    function ensureDataExists(date) {
        if (!db[date]) {
            db[date] = { cal: '', prot: '', carb: '', fat: '', steps: '', tasks: {} };
        }
        if (!db[date].tasks) db[date].tasks = {};
    }

    // Arayüzü Güncelle[cite: 1]
    function updateUI() {
        ensureDataExists(selectedDate);
        let data = db[selectedDate];

        // Takvim Render[cite: 1]
        const calContainer = document.getElementById('calendar');
        calContainer.innerHTML = "";
        const days = ['Paz', 'Pzt', 'Sal', 'Çar', 'Per', 'Cum', 'Cmt'];
        
        for(let i=6; i>=0; i--) {
            let d = new Date(); 
            d.setDate(d.getDate() - i);
            let ds = d.toISOString().slice(0,10);
            let dayName = days[d.getDay()];
            let active = ds === selectedDate ? 'active' : '';
            calContainer.innerHTML += `
                <div class="day-btn ${active}" onclick="selectDate('${ds}')">
                    <div style="font-size: 0.8em; margin-bottom: 5px;">${dayName}</div>
                    <div style="font-size: 1.2em;">${ds.slice(8,10)}</div>
                </div>`;
        }
        
        // Değerleri Ekrana Yazdır[cite: 1]
        document.getElementById('show-cal').innerHTML = `${data.cal || 0} <span>kcal</span>`;
        document.getElementById('show-prot').innerText = (data.prot || 0) + 'g';
        document.getElementById('show-carb').innerText = (data.carb || 0) + 'g';
        document.getElementById('show-fat').innerText = (data.fat || 0) + 'g';
        document.getElementById('show-steps').innerText = (data.steps || 0);

        // Form Değerlerini Doldur[cite: 1]
        ['cal','prot','carb','fat','steps'].forEach(id => {
            document.getElementById(id).value = data[id] || '';
        });

        // Listeleri Render Et
        renderList('list-supplements', tasksConfig.supplements);
        renderList('list-posture', tasksConfig.posture);
        renderList('list-abs', tasksConfig.abs);
        
        renderChart(); // Grafiği çiz[cite: 1]
    }

    // Listeleri Dinamik Oluşturma
    function renderList(elementId, taskArray) {
        const container = document.getElementById(elementId);
        container.innerHTML = '';
        let data = db[selectedDate];

        taskArray.forEach(task => {
            let isCompleted = data.tasks[task.id] || false;
            let activeClass = isCompleted ? 'completed' : '';
            
            container.innerHTML += `
                <li class="task-item ${activeClass}" onclick="toggleTask('${task.id}')">
                    <div class="custom-checkbox">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <span class="task-text">${task.label}</span>
                </li>
            `;
        });
    }

    // Görev Tikleme İşlemi
    function toggleTask(taskId) {
        ensureDataExists(selectedDate);
        db[selectedDate].tasks[taskId] = !db[selectedDate].tasks[taskId];
        localStorage.setItem('athleteDB', JSON.stringify(db)); // Kaydet[cite: 1]
        updateUI();
    }

    // Tarih Seçme[cite: 1]
    function selectDate(d) {
        selectedDate = d;
        let today = new Date().toISOString().slice(0,10);
        document.getElementById('date-title').innerText = d === today ? "Bugün" : d;
        updateUI();
    }

    // Form Değerlerini Kaydet[cite: 1]
    function saveData() {
        ensureDataExists(selectedDate);
        ['cal','prot','carb','fat','steps'].forEach(id => {
            db[selectedDate][id] = document.getElementById(id).value;
        });
        
        localStorage.setItem('athleteDB', JSON.stringify(db)); // Yerel hafızaya yaz[cite: 1]
        updateUI();

        // Buton animasyonu için
        const btn = document.querySelector('button');
        let originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-check-double"></i> Başarıyla Kaydedildi!';
        btn.style.background = '#059669';
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.style.background = '';
        }, 2000);
    }

    // Chart.js Karanlık Tema Grafiği[cite: 1]
    function renderChart() {
        let labels = Object.keys(db).sort().slice(-7);
        let chartData = labels.map(l => db[l].cal || 0);
        
        if(chart) chart.destroy();
        
        Chart.defaults.color = '#94a3b8';
        chart = new Chart(document.getElementById('myChart'), { 
            type: 'bar', 
            data: { 
                labels: labels.map(l => l.slice(8,10) + '/' + l.slice(5,7)), 
                datasets: [{ 
                    label: 'Günlük Kalori', 
                    data: chartData, 
                    backgroundColor: '#10b981',
                    borderRadius: 8,
                    borderSkipped: false
                }] 
            },
            options: { 
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.05)' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    // İlk Yükleme[cite: 1]
    updateUI();
</script>
</body>
</html>
