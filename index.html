<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş AI Fitness Takip</title>
    <style>
        :root {
            --bg-color: #121212; --container-bg: #1e1e1e; --text-color: #e0e0e0;
            --primary-color: #4CAF50; --protein-color: #2196F3; --ai-color: #9c27b0;
            --water-color: #00bcd4; --danger-color: #f44336; --border-radius: 8px;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: var(--container-bg); padding: 30px; border-radius: var(--border-radius); box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 500px; }
        h2, h3 { text-align: center; margin-top: 0; color: #fff; }
        
        .header-tools { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .date-picker { background-color: #2c2c2c; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; }
        
        .progress-section { margin-bottom: 20px; }
        .progress-header { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; margin-bottom: 5px;}
        .progress-bar { width: 100%; background-color: #333; border-radius: 10px; height: 15px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; transition: 0.4s ease; }
        #cal-fill { background-color: var(--primary-color); }
        #pro-fill { background-color: var(--protein-color); }

        /* Su Takibi CSS */
        .water-section { background-color: #1a2a3a; padding: 15px; border-radius: var(--border-radius); margin-bottom: 20px; text-align: center; border: 1px solid #005b6e;}
        .water-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; }
        .water-btn { background-color: var(--water-color); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; font-weight: bold;}
        .water-btn:hover { background-color: #0097a7; }
        
        /* Yapay Zeka CSS */
        .ai-section { background-color: #2a2a2a; padding: 15px; border-radius: var(--border-radius); border: 1px solid #444; margin-bottom: 20px; }
        .ai-header { color: var(--ai-color); font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; }
        textarea, input[type="file"] { width: 100%; padding: 10px; border: 1px solid #444; background-color: #1e1e1e; color: white; border-radius: var(--border-radius); box-sizing: border-box; margin-bottom: 10px; }
        button.action-btn { width: 100%; padding: 10px; border: none; border-radius: var(--border-radius); cursor: pointer; font-weight: bold; font-size: 15px; color: white;}
        .ai-btn { background-color: var(--ai-color); } .ai-btn:hover { background-color: #7b1fa2; }

        .list-section { max-height: 200px; overflow-y: auto; margin-bottom: 20px;}
        .log-item { background-color: #2c2c2c; padding: 10px; margin-bottom: 8px; border-radius: var(--border-radius); font-size: 13px; }
        .log-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; font-size: 14px;}
        .log-macros { color: #aaa; }
        .delete-btn { background-color: var(--danger-color); padding: 2px 8px; border-radius: 4px; cursor: pointer; color: white; border: none;}
        
        .routine-section { border-top: 1px solid #444; padding-top: 15px; }
        .checkbox-group { display: flex; align-items: center; margin-bottom: 10px; }
        .checkbox-group input { transform: scale(1.2); margin-right: 10px; cursor: pointer; }
        
        #imagePreview { max-width: 100%; max-height: 150px; border-radius: 8px; display: none; margin-bottom: 10px;}
    </style>
</head>
<body>

<div class="container">
    <div class="header-tools">
        <h3>Günlük Takip (<span id="currentDateDisplay">Bugün</span>)</h3>
        <input type="date" id="datePicker" class="date-picker" onchange="changeDate()">
    </div>

    <div class="progress-section">
        <div class="progress-header"><span>Kalori (<span id="cal-text">0</span> / 2400)</span></div>
        <div class="progress-bar"><div id="cal-fill" class="progress-fill"></div></div>
    </div>
    <div class="progress-section">
        <div class="progress-header"><span>Protein (<span id="pro-text">0</span> / 170g)</span></div>
        <div class="progress-bar"><div id="pro-fill" class="progress-fill"></div></div>
    </div>

    <div class="water-section">
        <div class="progress-header" style="color:var(--water-color)"><span>💧 Su Tüketimi (<span id="water-text">0</span> / 2500 ml)</span></div>
        <div class="water-controls">
            <button class="water-btn" onclick="updateWater(-250)">-</button>
            <span style="font-size: 18px; font-weight: bold;"><span id="glass-text">0</span> Bardak</span>
            <button class="water-btn" onclick="updateWater(250)">+</button>
        </div>
    </div>

    <div class="ai-section">
        <div class="ai-header"><span>✨ Gemini Vizyon Asistanı</span><span id="ai-status">Bekliyor...</span></div>
        <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
        <img id="imagePreview" src="" alt="Yemek Önizleme">
        <textarea id="aiInput" rows="2" placeholder="Veya metin gir... (Örn: 1.5 iskender)"></textarea>
        <button class="action-btn ai-btn" onclick="askGemini()">Analiz Et ve Ekle</button>
    </div>

    <div class="list-section" id="foodList"></div>

    <div class="routine-section">
        <h3>Adım ve Rutinler</h3>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input type="number" id="stepInput" placeholder="Bugünkü Adım Sayısı" style="width:70%; padding:8px; border-radius:4px; border:none; background:#2c2c2c; color:white;">
            <button class="action-btn" style="width:30%; background:#555;" onclick="saveSteps()">Kaydet</button>
        </div>
        <div class="checkbox-group"><input type="checkbox" id="chk-apt" onchange="saveCheckboxes()"><label>APT Egzersizi</label></div>
        <div class="checkbox-group"><input type="checkbox" id="chk-o3" onchange="saveCheckboxes()"><label>Omega-3</label></div>
        <div class="checkbox-group"><input type="checkbox" id="chk-d3" onchange="saveCheckboxes()"><label>D3+K2</label></div>
        <div class="checkbox-group"><input type="checkbox" id="chk-zma" onchange="saveCheckboxes()"><label>ZMA (Gece)</label></div>
    </div>
</div>

<script>
    // ŞİFRE ARTIK KODUN İÇİNDE DEĞİL, CİHAZIN HAFIZASINDAN ÇEKİLİYOR
    let GEMINI_API_KEY = localStorage.getItem('my_gemini_key'); 
    
    const goalCal = 2400; const goalPro = 170; const goalWater = 2500;
    
    let db = {}; let currentDate = ""; let base64Image = null;

    window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('datePicker').value = today;
        currentDate = today;
        if(localStorage.getItem('appDB')) { db = JSON.parse(localStorage.getItem('appDB')); }
        loadDayData();
    };

    function changeDate() {
        currentDate = document.getElementById('datePicker').value;
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('currentDateDisplay').innerText = (currentDate === today) ? "Bugün" : currentDate;
        loadDayData();
    }

    function initDay(date) {
        if(!db[date]) {
            db[date] = { foods: [], water: 0, steps: "", checks: { apt: false, o3: false, d3: false, zma: false } };
        }
    }

    function loadDayData() {
        initDay(currentDate); updateUI();
        
        document.getElementById('stepInput').value = db[currentDate].steps || "";
        const checks = db[currentDate].checks;
        ['apt', 'o3', 'd3', 'zma'].forEach(id => { document.getElementById('chk-' + id).checked = checks[id]; });
        
        // Fotoğraf alanını sıfırla
        document.getElementById('imageInput').value = "";
        document.getElementById('imagePreview').style.display = "none";
        base64Image = null;
    }

    function updateWater(amount) {
        db[currentDate].water += amount;
        if(db[currentDate].water < 0) db[currentDate].water = 0;
        saveData();
    }

    function saveSteps() {
        db[currentDate].steps = document.getElementById('stepInput').value;
        saveData();
        alert("Adım kaydedildi!");
    }

    // Resmi Base64'e çevirip ekranda gösterme
    function previewImage() {
        const file = document.getElementById('imageInput').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onloadend = function() {
            base64Image = reader.result.split(',')[1]; // Sadece data kısmı
            document.getElementById('imagePreview').src = reader.result;
            document.getElementById('imagePreview').style.display = "block";
        }
        reader.readAsDataURL(file);
    }

    async function askGemini() {
        // GÜVENLİK ADIMI: Şifre yoksa kullanıcıdan iste ve cihaza kaydet
        if (!GEMINI_API_KEY) {
            const userKey = prompt("Yapay zekayı kullanmak için lütfen yeni oluşturduğunuz Gemini API Anahtarınızı girin.\n(Bu şifre kodda tutulmaz, sadece bu cihaza kaydedilir):");
            if (userKey && userKey.trim() !== "") {
                GEMINI_API_KEY = userKey.trim();
                localStorage.setItem('my_gemini_key', GEMINI_API_KEY);
                alert("Şifre bu cihaza başarıyla kaydedildi! Artık analizi başlatabilirsin.");
            } else {
                alert("API anahtarı girmeden analizi başlatamazsın.");
                return;
            }
        }
        
        const userInput = document.getElementById('aiInput').value;
        if(!userInput && !base64Image) { alert("Lütfen ya bir fotoğraf yükle ya da metin gir."); return; }

        document.getElementById('ai-status').innerText = "Göze/Metne Bakılıyor...";
        
        const systemPrompt = `Kullanıcı bir yemek fotoğrafı ve/veya metni girdi: "${userInput}". Yemeği tanı ve Toplam Kalori, Protein(g), Karbonhidrat(g), Yağ(g) ve Lif(g) değerlerini tahmin et. Sadece şu formatta JSON döndür, ASLA başka metin yazma: {"name": "Yemek Adı", "cal": 100, "pro": 10, "carb": 20, "fat": 5, "fib": 2}`;

        // Payload hazırlığı: Resim varsa içeriğe ekle
        let parts = [{ text: systemPrompt }];
        if(base64Image) {
            parts.push({
                inline_data: { mime_type: "image/jpeg", data: base64Image }
            });
        }

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: parts }] })
            });

            // GÜVENLİK ADIMI: Şifre yanlışsa veya silindiyse cihazdan temizle
            if (!response.ok) {
                if (response.status === 400 || response.status === 403) {
                    localStorage.removeItem('my_gemini_key');
                    GEMINI_API_KEY = null;
                    alert("API Anahtarı geçersiz! Google AI Studio'dan sildiysen yeni oluşturduğun şifreyi girmen gerekecek. Lütfen tekrar dene.");
                }
                throw new Error("API yanıt vermedi.");
            }

            const data = await response.json();
            let aiText = data.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, '').trim();
            const result = JSON.parse(aiText);
            
            db[currentDate].foods.push({ 
                id: Date.now(), name: result.name, cal: result.cal, pro: result.pro, 
                carb: result.carb || 0, fat: result.fat || 0, fib: result.fib || 0 
            });
            saveData();
            
            document.getElementById('ai-status').innerText = "Eklendi!";
            document.getElementById('aiInput').value = '';
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreview').style.display = "none";
            base64Image = null;
        } catch (error) {
            document.getElementById('ai-status').innerText = "Hata!";
            console.error(error); 
        } finally {
            setTimeout(() => { document.getElementById('ai-status').innerText = "Bekliyor..."; }, 3000);
        }
    }

    function deleteFood(id) { db[currentDate].foods = db[currentDate].foods.filter(f => f.id !== id); saveData(); }

    function updateUI() {
        // Su Güncellemesi
        document.getElementById('water-text').innerText = db[currentDate].water;
        document.getElementById('glass-text').innerText = db[currentDate].water / 250;

        // Besin Güncellemesi
        const foods = db[currentDate].foods;
        let totalCal = foods.reduce((sum, f) => sum + f.cal, 0);
        let totalPro = foods.reduce((sum, f) => sum + f.pro, 0);

        document.getElementById('cal-text').innerText = totalCal;
        document.getElementById('pro-text').innerText = totalPro;
        document.getElementById('cal-fill').style.width = Math.min((totalCal / goalCal) * 100, 100) + '%';
        document.getElementById('pro-fill').style.width = Math.min((totalPro / goalPro) * 100, 100) + '%';
        document.getElementById('cal-fill').style.backgroundColor = totalCal > goalCal ? '#f44336' : '#4CAF50';

        const listDiv = document.getElementById('foodList');
        listDiv.innerHTML = '';
        foods.forEach(f => {
            listDiv.innerHTML += `
                <div class="log-item">
                    <div class="log-header">
                        <span>${f.name} (${f.cal} kcal)</span>
                        <button class="delete-btn" onclick="deleteFood(${f.id})">Sil</button>
                    </div>
                    <div class="log-macros">
                        ${f.pro}g Protein | ${f.carb}g Karbonhidrat | ${f.fat}g Yağ | ${f.fib}g Lif
                    </div>
                </div>`;
        });
    }

    function saveCheckboxes() {
        db[currentDate].checks = {
            apt: document.getElementById('chk-apt').checked,
            o3: document.getElementById('chk-o3').checked,
            d3: document.getElementById('chk-d3').checked,
            zma: document.getElementById('chk-zma').checked
        };
        saveData();
    }

    function saveData() { localStorage.setItem('appDB', JSON.stringify(db)); updateUI(); }
</script>

</body>
</html>
