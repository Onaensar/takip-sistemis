<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>GymPro Ultimate AI</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #121212; padding: 20px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; }
        button { background: #30d158; padding: 15px; width: 100%; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
<div class="card">
    <input type="password" id="key" placeholder="API Anahtarın">
    <input type="file" id="photo" accept="image/*">
    <textarea id="mealInput" placeholder="Ne yedin?"></textarea>
    <button onclick="scanFood()">Analiz Et</button>
    <div id="status" style="margin-top:10px; color:red;"></div>
</div>

<script>
    async function scanFood() {
        let file = document.getElementById("photo").files[0];
        let input = document.getElementById("mealInput").value;
        let key = document.getElementById("key").value;
        let status = document.getElementById("status");
        
        if(!key) return alert("API Key gir!");
        status.innerText = "Analiz ediliyor...";

        try {
            let base64 = "";
            if(file) {
                let canvas = document.createElement("canvas");
                let img = await createImageBitmap(file);
                canvas.width = 400; canvas.height = (img.height * 400) / img.width;
                canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
                base64 = canvas.toDataURL("image/jpeg", 0.6).split(",")[1];
            }

            let response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [
                    {text: '{"name":"Yemek","cal":0,"pro":0,"carb":0,"fat":0,"fib":0}. Sadece JSON dön.' + input},
                    base64 ? {inlineData:{mimeType:"image/jpeg", data:base64}} : {text: ""}
                ]}]})
            });

            let data = await response.json();
            console.log("API Yanıtı:", data); // Hatanın ne olduğunu buradan F12 ile göreceksin

            if (data.error) {
                status.innerText = "API Hatası: " + data.error.message;
            } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                status.style.color = "green";
                status.innerText = "Başarılı: " + data.candidates[0].content.parts[0].text;
            } else {
                status.innerText = "Beklenmedik yanıt döndü.";
            }
        } catch(e) { 
            status.innerText = "Bağlantı Hatası: " + e.message;
        }
    }
</script>
</body>
</html>
