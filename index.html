<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fitness Takip</title>
    <style>
        :root { --bg-color: #121212; --container-bg: #1e1e1e; --text-color: #e0e0e0; --primary-color: #4CAF50; --protein-color: #2196F3; --ai-color: #9c27b0; --water-color: #00bcd4; --danger-color: #f44336; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background-color: var(--container-bg); padding: 20px; border-radius: 10px; width: 100%; max-width: 500px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #fff; margin-bottom: 20px; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #333; border-radius: 8px; }
        .progress-bar { width: 100%; background: #333; height: 15px; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .fill { height: 100%; width: 0%; transition: 0.3s; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; margin-top: 5px; }
        .btn-ai { background: var(--ai-color); }
        .btn-water { background: var(--water-color); width: 45px; height: 45px; border-radius: 50%; font-size: 20px; }
        .log-item { background: #2c2c2c; padding: 10px; margin-bottom: 5px; border-radius: 4px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div class="container">
    <h2>Günlük Takip</h2>
    <input type="date" id="datePicker" onchange="loadDayData()">
    <div class="section">
        <div>Kalori: <span id="cal-text">0</span>/2400</div>
        <div class="progress-bar"><div id="cal-fill" class="fill" style="background:var(--primary-color)"></div></div>
    </div>
    <div class="section">
        <div class="progress-header">💧 Su Tüketimi: <span id="water-text">0</span> ml</div>
        <div style="display:flex; justify-content:center; gap:20px; margin-top:10px;">
            <button class="btn-water" onclick="updateWater(-250)">-</button>
            <button class="btn-water" onclick="updateWater(250)">+</button>
        </div>
    </div>
    <div class="section">
        <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
        <img id="imagePreview" style="max-width:100%; display:none; border-radius:4px; margin-bottom:10px;">
        <textarea id="aiInput" placeholder="Ne yedin?"></textarea>
        <button class="btn-ai" onclick="askGemini()">Analiz Et ve Ekle</button>
        <p id="ai-status" style="font-size:12px; text-align:center;"></p>
    </div>
    <div id="foodList" class="list-section"></div>
</div>

<script>
    let GEMINI_API_KEY = localStorage.getItem('my_gemini_key');
    let db = JSON.parse(localStorage.getItem('appDB')) || {};
    let currentDate = new Date().toISOString().split('T')[0];
    let base64Image = null;

    document.getElementById('datePicker').value = currentDate;
    
    function loadDayData() {
        currentDate = document.getElementById('datePicker').value;
        if(!db[currentDate]) db[currentDate] = { foods: [], water: 0 };
        updateUI();
    }

    function updateWater(amt) {
        db[currentDate].water = Math.max(0, db[currentDate].water + amt);
        saveData();
    }

    function previewImage() {
        const file = document.getElementById('imageInput').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            document.getElementById('imagePreview').src = reader.result;
            document.getElementById('imagePreview').style.display = "block";
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 800; canvas.height = (img.height * 800) / img.width;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                base64Image = canvas.toDataURL("image/jpeg", 0.7).split(',')[1];
            };
            img.src = reader.result;
        };
        reader.readAsDataURL(file);
    }

    async function askGemini() {
        if(!GEMINI_API_KEY) GEMINI_API_KEY = prompt("API Anahtarını Gir:");
        if(!GEMINI_API_KEY) return;
        localStorage.setItem('my_gemini_key', GEMINI_API_KEY);

        document.getElementById('ai-status').innerText = "Analiz ediliyor...";
        const promptText = `Yemeği tanı ve JSON formatında döndür: {"name": "Yemek", "cal": 100, "pro": 10, "carb": 20, "fat": 5, "fib": 2}`;
        
        let parts = [{ text: promptText + (document.getElementById('aiInput').value || "") }];
        if(base64Image) parts.push({ inlineData: { mimeType: "image/jpeg", data: base64Image } });

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: parts }] })
            });
            const data = await resp.json();
            const res = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
            db[currentDate].foods.push(res);
            saveData();
            document.getElementById('ai-status').innerText = "Eklendi!";
        } catch (e) { alert("Hata oluştu, konsolu kontrol et."); }
    }

    function saveData() { localStorage.setItem('appDB', JSON.stringify(db)); updateUI(); }
    function updateUI() {
        const foods = db[currentDate].foods;
        document.getElementById('water-text').innerText = db[currentDate].water;
        let cal = foods.reduce((s, f) => s + f.cal, 0);
        document.getElementById('cal-text').innerText = cal;
        document.getElementById('cal-fill').style.width = Math.min((cal/2400)*100, 100) + "%";
        
        let list = document.getElementById('foodList');
        list.innerHTML = "";
        foods.forEach((f, i) => {
            list.innerHTML += `<div class="log-item">${f.name} (${f.cal} kcal) <button onclick="del(${i})" style="background:red">X</button></div>`;
        });
    }
    function del(i) { db[currentDate].foods.splice(i, 1); saveData(); }
    loadDayData();
</script>
</body>
</html>
